name: tianxuan
description: "1Panel third-party manager"
publish_to: 'none'
version: 0.3.1+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  shared_preferences: ^2.2.0
  json_annotation: ^4.8.0
  crypto: ^3.0.0
  flutter_secure_storage: ^9.2.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  share_plus: ^12.0.2
  flutter_secure_storage_web: ^1.2.1
  http: ^1.2.0
  url_launcher: ^6.2.0
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  adaptive_icon_foreground: "assets/Tianxuan.svg"
  adaptive_icon_background: "#FFFFFF"
  image_path: "assets/icon-1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/Tianxuan.svg
